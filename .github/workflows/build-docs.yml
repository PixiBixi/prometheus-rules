name: Build docs

on:
  push:
    branches: [main]
    paths:
      - exporters/**
      - rules/**
      - build.py

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml

      - name: Install promtool
        run: |
          PROM_VERSION="3.11.0"
          curl -sSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin "prometheus-${PROM_VERSION}.linux-amd64/promtool"

      - name: Validate PromQL rules
        run: python3 validate_rules.py

      - name: Build data.json
        run: python3 build.py

      - name: Commit updated data.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): rebuild data.json [skip ci]"
          file_pattern: docs/data.json
