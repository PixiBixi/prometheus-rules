- name: haproxy.records
  rules:

    # ── Server-level → Backend aggregations (highest cardinality reduction) ──
    # haproxy_server_* has labels proxy+server — pre-aggregate to namespace+proxy
    # to avoid full server-label scan on every dashboard/alert query.

    - record: haproxy:backend_http_responses:rate5m
      expr: sum by (namespace, proxy, code) (rate(haproxy_server_http_responses_total[5m]))

    - record: haproxy:backend_http_responses_5xx:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_server_http_responses_total{code="5xx"}[5m]))

    - record: haproxy:backend_http_responses_4xx:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_server_http_responses_total{code="4xx"}[5m]))

    - record: haproxy:backend_bytes_in:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_server_bytes_in_total[5m]))

    - record: haproxy:backend_bytes_out:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_server_bytes_out_total[5m]))

    - record: haproxy:backend_sessions:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_server_sessions_total[5m]))

    - record: haproxy:backend_connection_errors:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_server_connection_errors_total[5m]))

    - record: haproxy:backend_response_errors:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_server_response_errors_total[5m]))

    # ── Backend-level derived metrics ─────────────────────────────────────────

    # 5xx error rate % per backend
    - record: haproxy:backend_5xx_error_rate:ratio5m
      expr: |
        haproxy:backend_http_responses_5xx:rate5m
        / on(namespace, proxy) group_left()
        clamp_min(
          sum by (namespace, proxy) (haproxy:backend_http_responses:rate5m),
          1
        ) * 100

    # 4xx error rate % per backend (threshold >10 to ignore default backend noise)
    - record: haproxy:backend_4xx_error_rate:ratio5m
      expr: |
        (haproxy:backend_http_responses_4xx:rate5m > 10)
        / on(namespace, proxy) group_left()
        clamp_min(
          sum by (namespace, proxy) (haproxy:backend_http_responses:rate5m),
          1
        ) * 100

    # Combined error ratio — fixes the operator precedence bug from the original
    - record: haproxy:backend_error_rate:ratio5m
      expr: |
        (
          (haproxy:backend_http_responses_4xx:rate5m > 10)
          + haproxy:backend_http_responses_5xx:rate5m
        )
        / on(namespace, proxy) group_left()
        clamp_min(
          sum by (namespace, proxy) (haproxy:backend_http_responses:rate5m),
          1
        )

    # Session saturation % — used by HAproxyBackendMaxActiveSession alert
    - record: haproxy:backend_session_saturation:ratio
      expr: |
        haproxy_backend_current_sessions
        / on(namespace, proxy) group_left()
        clamp_min(haproxy_backend_limit_sessions, 1)
        * 100

    # Connection reuse ratio — keep-alive efficiency
    - record: haproxy:backend_connection_reuse:ratio5m
      expr: |
        rate(haproxy_backend_connection_reuses_total[5m])
        / on(namespace, proxy) group_left()
        clamp_min(rate(haproxy_backend_connection_attempts_total[5m]), 1)

    # Abort rate (client + server) per backend
    - record: haproxy:backend_aborts:rate5m
      expr: |
        sum by (namespace, proxy) (
          rate(haproxy_backend_client_aborts_total[5m])
          + rate(haproxy_backend_server_aborts_total[5m])
        )

    # Retry rate per backend
    - record: haproxy:backend_retries:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_backend_retry_warnings_total[5m]))

    # Downtime accumulation rate per backend — finer signal than binary status
    - record: haproxy:backend_downtime:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_backend_downtime_seconds_total[5m]))

    # ── Frontend-level ────────────────────────────────────────────────────────

    - record: haproxy:frontend_http_responses_5xx:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_frontend_http_responses_total{code="5xx"}[5m]))

    - record: haproxy:frontend_http_responses:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_frontend_http_responses_total[5m]))

    # Frontend 5xx error rate %
    - record: haproxy:frontend_5xx_error_rate:ratio5m
      expr: |
        haproxy:frontend_http_responses_5xx:rate5m
        / on(namespace, proxy) group_left()
        clamp_min(haproxy:frontend_http_responses:rate5m, 1)
        * 100

    # Denied connections rate (security blocks)
    - record: haproxy:frontend_denied_connections:rate5m
      expr: sum by (namespace, proxy) (rate(haproxy_frontend_denied_connections_total[5m]))
