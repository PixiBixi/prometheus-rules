- name: nvme.rules
  rules:
    - alert: NVMEDown
      expr: sum(min_over_time(up{job="nvme_exporter"}[2m])) by (job,instance) == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        description: "nvme_exporter seems down on {{$labels.instance}}"
        summary: "NVME Exporter Unreachable {{$labels.instance}}"
    - alert: NVMEMediaError
      expr: sum(rate(nvme_media_errors[1m])) by (instance,device,job) > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Critical Usage for {{ $labels.device }}"
        description: "You should change the NVME {{ $labels.device }} on {{ $labels.instance }}"
    - alert: NVMEUsage
      expr: nvme_percent_used > 40
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "High NVMe wear level for {{ $labels.device }} on {{ $labels.instance }}"
        description: "NVMe {{ $labels.device }} on {{ $labels.instance }} wear level is above 40% — plan for replacement."
    - alert: NVMEUsageCritical
      expr: nvme_percent_used > 60
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Critical NVMe wear level for {{ $labels.device }} on {{ $labels.instance }}"
        description: "NVMe {{ $labels.device }} on {{ $labels.instance }} wear level is above 60% — replace soon."

    - alert: NVMECriticalWarning
      expr: nvme_critical_warning > 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "NVMe critical warning on {{ $labels.device }}"
        description: "NVMe controller has active critical warnings on {{ $labels.device }}."

    - alert: NVMEAvailSpareLow
      expr: nvme_avail_spare < nvme_spare_thresh
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "NVMe spare capacity low on {{ $labels.device }}"
        description: "NVMe spare capacity below manufacturer threshold on {{ $labels.device }} ({{ $value }}%)."

    - alert: NVMEUnsafeShutdowns
      expr: increase(nvme_unsafe_shutdowns[24h]) > 0
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "NVMe unsafe shutdown on {{ $labels.device }}"
        description: "NVMe device {{ $labels.device }} had an unsafe shutdown in the last 24h."

    - alert: NVMEErrorLogEntries
      expr: increase(nvme_num_err_log_entries[1h]) > 0
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "NVMe error log entries on {{ $labels.device }}"
        description: "NVMe device {{ $labels.device }} logged new error entries in the past hour."

    - alert: NVMEHighTemperature
      expr: nvme_temperature > 158
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "NVMe high temperature on {{ $labels.device }}"
        description: "NVMe device {{ $labels.device }} temperature above 70C ({{ $value }}F). Check cooling."
