- name: ksql.rules
  rules:
    - alert: KsqldbExporter
      expr: up{job="ksqldb"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 2 minutes."
        summary: "Job {{ $labels.job }} having an issue on {{ $labels.instance }}"
    - alert: KsqlConnectorDown
      expr: sum(ksql_ksql_metrics_ksql_queries_ksql_service_id_default_query_status{query_status!="RUNNING"}) by (instance,job,ksql_query)
      for: 5m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} of job {{ $labels.job }} has a down connector for {{ $labels.ksql_query }}"
        summary: "Instance {{ $labels.instance }} has a down connector"
    - alert: KsqlConnectorDown
      expr: sum(ksql_ksql_metrics_ksql_queries_query_status{query_status!="RUNNING"}) by (ksql_query,job,instance)
      for: 5m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} of job {{ $labels.job }} has a down connector for {{ $labels.ksql_query }}"
        summary: "Instance {{ $labels.instance }} has a down connector"
    - alert: KsqlServerDown
      expr: sum(ksql_ksql_engine_query_stats_liveness_indicator < 1) by (instance,job)
      for: 2m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 2 minutes."
        summary: "KSQL {{ $labels.instance }} having an issue"
    - alert: KsqlQueriesNotRunning
      expr: sum(ksql_ksql_engine_query_stats_not_running_queries > 0) by (instance,job)
      for: 2m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} of job {{ $labels.job }} has some down queries, please check why"
        summary: "KSQL queries down on {{ $labels.instance }}"
    - alert: KsqlQueriesAreRebalancing
      expr: sum(ksql_ksql_engine_query_stats_rebalancing_queries > 0) by (instance,job)
      for: 5m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} has rebalancing queries for 5 minuts, it could be normal"
        summary: "KSQL queries are rebalancing on {{ $labels.instance }} for 5 minuts"

    - alert: KSQLErrorQueries
      expr: ksql_ksql_engine_query_stats_error_queries > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "KSQL queries in ERROR state on {{ $labels.ksql_cluster }}"
        description: "$value KSQL query(ies) are in ERROR state on cluster {{ $labels.ksql_cluster }}. Data processing is stopped for those queries."

    - alert: KSQLPendingErrorQueries
      expr: ksql_ksql_engine_query_stats_pending_error_queries > 0
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "KSQL queries in PENDING_ERROR state on {{ $labels.ksql_cluster }}"
        description: "$value KSQL query(ies) are in PENDING_ERROR state on cluster {{ $labels.ksql_cluster }}."

    - alert: KSQLHighErrorRate
      expr: ksql_ksql_engine_query_stats_error_rate > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "KSQL cluster {{ $labels.ksql_cluster }} high error rate"
        description: "KSQL cluster {{ $labels.ksql_cluster }} is failing to process more than 5% of consumed messages."

    - alert: KafkaConsumerLagHigh
      expr: kafka_consumer_consumer_fetch_manager_metrics_records_lag_max > 10000
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Kafka consumer {{ $labels.client_id }} high lag on {{ $labels.topic }}"
        description: "Kafka consumer {{ $labels.client_id }} has lag above 10000 records on topic {{ $labels.topic }} partition {{ $labels.partition }}."


