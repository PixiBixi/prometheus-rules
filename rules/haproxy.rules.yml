- name: haproxy.rules
  rules:
    # ── Process ──────────────────────────────────────────────

    - alert: HAproxyDown
      expr: |
        group by (job, instance) (last_over_time(up{job=~".*haproxy.*"}[1h]))
        unless
        group by (job, instance) (last_over_time(up{job=~".*haproxy.*"}[5m]))
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy scrape target down — {{ $labels.job }} @ {{ $labels.instance }}"
        description: "{{ $labels.job }} @ {{ $labels.instance }} has been down for more than 5 minutes"

    - alert: HAproxyProcessStopping
      expr: haproxy_process_stopping == 1
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy process stopping — {{ $labels.instance }}"
        description: "HAProxy worker process is in stopping/draining state on {{ $labels.instance }} — possible crash or stuck reload"

    - alert: HAproxyProcessPoolFailures
      expr: rate(haproxy_process_pool_failures_total[5m]) > 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy process memory pool failures — {{ $labels.instance }}"
        description: "HAProxy memory pool allocation failing on {{ $labels.instance }} — OOM risk, connections may be rejected"

    - alert: HAproxyProcessIdleLow
      expr: haproxy_process_idle_time_percent < 10
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy process idle low — {{ $labels.instance }}"
        description: "HAProxy process idle time below 10% on {{ $labels.instance }} — process is saturated"

    - alert: HAproxyProcessDroppedLogs
      expr: rate(haproxy_process_dropped_logs_total[5m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy process dropped logs — {{ $labels.instance }}"
        description: "HAProxy is dropping log messages on {{ $labels.instance }} — syslog or log socket overloaded"

    - alert: HAproxyProcessFailedResolutions
      expr: increase(haproxy_process_failed_resolutions[5m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy DNS resolution failures — {{ $labels.instance }}"
        description: "HAProxy is failing DNS resolutions on {{ $labels.instance }} — backends may become unreachable"

    - alert: HAproxyMaxconnConnectionReuseRisk
      expr: |
        haproxy_process_max_connections > 0
          and
        haproxy_process_current_connections / haproxy_process_max_connections > 0.5
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy maxconn saturation disabling connection reuse — {{ $labels.instance }}"
        description: "HAProxy connections at {{ $value | humanizePercentage }} of maxconn on {{ $labels.instance }}. Above ~50%, HAProxy stops pooling idle backend connections to keep FD usage under the global limit (tune.pool-low-fd-ratio / tune.pool-high-fd-ratio). Increase maxconn and FD limits (ulimit -n), tune pool FD ratios, or reduce frontend session count."

    - alert: HAproxyProcessConnectionsCritical
      expr: |
        haproxy_process_max_connections > 0
          and
        haproxy_process_current_connections / haproxy_process_max_connections > 0.9
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy process connections critical — {{ $labels.instance }}"
        description: "HAProxy current connections exceed 90% of max on {{ $labels.instance }} — imminent connection rejection"

    - alert: HAproxyProcessConnectionsSaturation
      expr: |
        haproxy_process_max_connections > 0
          and
        haproxy_process_current_connections / haproxy_process_max_connections > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy process connections near limit — {{ $labels.instance }}"
        description: "HAProxy current connections exceed 80% of max on {{ $labels.instance }} — risk of connection rejection"

    - alert: HAproxyProcessSslConnectionsCritical
      expr: |
        haproxy_process_max_ssl_connections > 0
          and
        haproxy_process_current_ssl_connections / haproxy_process_max_ssl_connections > 0.9
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy SSL connections critical — {{ $labels.instance }}"
        description: "HAProxy current SSL connections exceed 90% of max on {{ $labels.instance }} — imminent SSL endpoint rejection"

    - alert: HAproxyProcessSslConnectionsSaturation
      expr: |
        haproxy_process_max_ssl_connections > 0
          and
        haproxy_process_current_ssl_connections / haproxy_process_max_ssl_connections > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy SSL connections near limit — {{ $labels.instance }}"
        description: "HAProxy current SSL connections exceed 80% of max on {{ $labels.instance }}"

    - alert: HAproxyConnectionRateNearLimit
      expr: haproxy_process_current_connection_rate / haproxy_process_limit_connection_rate > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy connection rate near limit — {{ $labels.instance }}"
        description: "HAProxy connection rate at 80% of limit on {{ $labels.instance }}"

    - alert: HAproxyProcessSessionRateNearLimit
      expr: |
        haproxy_process_limit_session_rate > 0
          and
        haproxy_process_current_session_rate / haproxy_process_limit_session_rate > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy session rate near limit — {{ $labels.instance }}"
        description: "HAProxy session rate at 80% of limit on {{ $labels.instance }}"

    # ── Frontend ─────────────────────────────────────────────

    - alert: HAproxyFrontendDown
      expr: haproxy_frontend_status{state="OPEN"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy frontend down — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Frontend {{ $labels.proxy }} @ {{ $labels.instance }} is not in OPEN state"

    - alert: HAproxyFrontendSessionCritical
      expr: haproxy_frontend_current_sessions / haproxy_frontend_limit_sessions > 0.85
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy frontend session critical saturation — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Frontend {{ $labels.proxy }} @ {{ $labels.instance }} session usage above 85% — connection refusal imminent"

    - alert: HAproxyFrontendSessionSaturation
      expr: haproxy_frontend_current_sessions / haproxy_frontend_limit_sessions > 0.7
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy frontend session saturation — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Frontend {{ $labels.proxy }} @ {{ $labels.instance }} session usage above 70%"

    - alert: HAproxyFrontendRequestErrors
      expr: |
        (
          sum by (proxy, instance, job) (rate(haproxy_frontend_request_errors_total[5m]))
          /
          sum by (proxy, instance, job) (rate(haproxy_frontend_http_requests_total[5m]))
        ) > 0.01
        and
        sum by (proxy, instance, job) (rate(haproxy_frontend_http_requests_total[5m])) > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy frontend request errors — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "More than 1% invalid requests on frontend {{ $labels.proxy }} @ {{ $labels.instance }} ({{ $value | humanizePercentage }})"

    - alert: HAproxyFrontendSecurityBlockedRequests
      expr: |
        (
          sum by (proxy, instance, job) (rate(haproxy_frontend_denied_connections_total[2m]))
          /
          sum by (proxy, instance, job) (rate(haproxy_frontend_connections_total[2m]))
        ) > 0.05
        and
        sum by (proxy, instance, job) (rate(haproxy_frontend_connections_total[2m])) > 10
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy frontend security blocked requests — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "More than 5% of connections blocked by ACL on frontend {{ $labels.proxy }} @ {{ $labels.instance }} ({{ $value | humanizePercentage }})"

    # ── Backend ──────────────────────────────────────────────

    - alert: HAproxyBackendDown
      expr: (sum by (namespace, proxy) (haproxy_backend_agg_server_check_status{state='UP'}) == 0)
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "All HAProxy backends down — {{ $labels.proxy }} @ {{ $labels.namespace }}"
        description: "All HAProxy backends are down for proxy {{ $labels.proxy }} in namespace {{ $labels.namespace }}"

    - alert: HAproxyBackendStatusDown
      expr: haproxy_backend_status{state!="UP"} == 1
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy backend status not UP — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "HAProxy backend {{ $labels.proxy }} @ {{ $labels.instance }} is not UP"

    - alert: HAproxyHAsNoAliveBackends
      expr: (haproxy_backend_active_servers + haproxy_backend_backup_servers) == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy no alive backends — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "HAProxy has no alive active or backup backends for {{ $labels.proxy }} @ {{ $labels.instance }}"

    - alert: HAproxyBackendConnectionErrors
      expr: |
        (
          sum by (proxy, instance, job) (rate(haproxy_backend_connection_errors_total[5m]))
          /
          sum by (proxy, instance, job) (rate(haproxy_backend_connection_attempts_total[5m]))
        ) > 0.05
        and
        sum by (proxy, instance, job) (rate(haproxy_backend_connection_attempts_total[5m])) > 10
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy backend connection errors — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "More than 5% of connection attempts failing on {{ $labels.proxy }} @ {{ $labels.instance }} ({{ $value | humanizePercentage }}) — check backend health or network connectivity"

    - alert: HAproxyHighHttp5xxErrorRateBackend
      expr: ((sum by (proxy,instance,job) (rate(haproxy_backend_http_responses_total{code="5xx"}[5m])) / sum by (proxy,instance,job) (rate(haproxy_backend_http_responses_total[5m]))) * 100) > 5
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy high HTTP 5xx error rate — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Too many HTTP requests with status 5xx (> 5%) on {{ $labels.proxy }} @ {{ $labels.instance }}"

    - alert: HAproxyHighHttp4xxErrorRateBackend
      expr: ((sum by (proxy,instance,job) (rate(haproxy_backend_http_responses_total{code="4xx",proxy!~".*default-local-service.*"}[5m])) / sum by (proxy,instance,job) (rate(haproxy_backend_http_responses_total{proxy!~".*default-local-service.*"}[5m]))) * 100) > 50
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy high HTTP 4xx error rate — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Too many HTTP requests with status 4xx (> 50%) on {{ $labels.proxy }} @ {{ $labels.instance }}"

    - alert: HAproxyHighHttp4xxErrorRateBackendWarning
      expr: ((sum by (proxy,instance,job) (rate(haproxy_backend_http_responses_total{code="4xx",proxy!~".*default-local-service.*"}[5m])) / sum by (proxy,instance,job) (rate(haproxy_backend_http_responses_total{proxy!~".*default-local-service.*"}[5m]))) * 100) > 15
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy high HTTP 4xx error rate (warning) — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Too many HTTP requests with status 4xx (> 15%) on {{ $labels.proxy }} @ {{ $labels.instance }}"

    - alert: HAproxyBackendConnectionReuseCollapse
      expr: |
        (
          sum by (proxy, instance, job) (rate(haproxy_backend_connection_reuses_total[5m]))
          /
          sum by (proxy, instance, job) (rate(haproxy_backend_connection_attempts_total[5m]))
        ) * 100 < 20
        and
        sum by (proxy, instance, job) (rate(haproxy_backend_connection_attempts_total[5m])) > 10
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy backend connection reuse collapsed — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Backend {{ $labels.proxy }} @ {{ $labels.instance }} connection reuse rate is {{ $value | printf \"%.0f\" }}% (< 20%) for the last 10 minutes. Almost no connections are being reused — check keep-alive settings, backend health, or HTTP version negotiation."

    - alert: HAproxyBackendConnectionReuseDrop
      expr: |
        (
          sum by (proxy, instance, job) (rate(haproxy_backend_connection_reuses_total[5m]))
          /
          sum by (proxy, instance, job) (rate(haproxy_backend_connection_attempts_total[5m]))
        ) * 100 < 50
        and
        sum by (proxy, instance, job) (rate(haproxy_backend_connection_attempts_total[5m])) > 10
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy backend connection reuse dropped — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Backend {{ $labels.proxy }} @ {{ $labels.instance }} connection reuse rate is {{ $value | printf \"%.0f\" }}% (< 50%) for the last 10 minutes. This may indicate misconfigured keep-alive, backend restarts, or HTTP/1.0 fallback."

    - alert: HAproxyBackendMaxActiveSessionHigh
      expr: (haproxy_server_max_sessions > 0 * 100) / (haproxy_server_limit_sessions > 0) > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy backend max active session > 80% — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Session limit from {{ $labels.proxy }}/{{ $labels.server }} @ {{ $labels.instance }} reached 80% of limit - {{ $value | printf \"%.2f\"}}%"

    - alert: HAproxyBackendQueueTimeHigh
      expr: haproxy_backend_queue_time_average_seconds > 0.5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy backend queue time high — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Backend {{ $labels.proxy }} @ {{ $labels.instance }} queue wait time above 500ms ({{ $value | humanizeDuration }})"

    - alert: HAproxyBackendResponseTimeHigh
      expr: haproxy_backend_response_time_average_seconds > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy backend response time high — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Backend {{ $labels.proxy }} @ {{ $labels.instance }} average response time above 1s ({{ $value | humanizeDuration }})"

    - alert: HAproxyBackendRedispatch
      expr: |
        (
          sum by (proxy, instance, job) (rate(haproxy_backend_redispatch_warnings_total[5m]))
          /
          sum by (proxy, instance, job) (rate(haproxy_backend_connection_attempts_total[5m]))
        ) > 0.05
        and
        sum by (proxy, instance, job) (rate(haproxy_backend_connection_attempts_total[5m])) > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy backend redispatch — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "More than 5% of connections redispatched on {{ $labels.proxy }} @ {{ $labels.instance }} ({{ $value | humanizePercentage }}) — a server is likely flapping"

    - alert: HAproxyPendingRequests
      expr: sum by (proxy,job,instance) (rate(haproxy_backend_current_queue[5m])) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy pending requests — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "Some HAProxy requests are pending on {{ $labels.proxy }} @ {{ $labels.instance }} - {{ $value | printf \"%.2f\"}}"

    - alert: HAproxyRetryHigh
      expr: |
        sum by (proxy, job, instance) (rate(haproxy_backend_retry_warnings_total[5m]))
        /
        sum by (proxy, job, instance) (rate(haproxy_backend_connection_attempts_total[5m]))
        > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy retry high — {{ $labels.proxy }} @ {{ $labels.instance }}"
        description: "High retry rate on {{ $labels.proxy }} @ {{ $labels.instance }}: {{ $value | humanizePercentage }} of connection attempts"

    - alert: HAproxyBlackholedTrafficNamespaceWarning
      expr: |
        (
          sum by (namespace) (rate(haproxy_backend_http_responses_total{proxy=~".*default-local-service.*"}[5m]))
          /
          sum by (namespace) (rate(haproxy_backend_http_responses_total[5m]))
        ) * 100 > 0.5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy blackholed traffic in {{ $labels.namespace }} (> 0.5%)"
        description: "More than 0.5% of requests in {{ $labels.namespace }} are hitting the default backend — possible ingress misconfiguration or high 404 rate"

    - alert: HAproxyBlackholedTrafficNamespaceCritical
      expr: |
        (
          sum by (namespace) (rate(haproxy_backend_http_responses_total{proxy=~".*default-local-service.*"}[5m]))
          /
          sum by (namespace) (rate(haproxy_backend_http_responses_total[5m]))
        ) * 100 > 2
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy blackholed traffic in {{ $labels.namespace }} (> 2%)"
        description: "More than 2% of requests in {{ $labels.namespace }} are hitting the default backend — possible ingress misconfiguration or high 404 rate"

    # ── Server ───────────────────────────────────────────────

    - alert: HAproxyServerDown
      expr: haproxy_server_status{state="UP"} == 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy server down — {{ $labels.proxy }}/{{ $labels.server }} @ {{ $labels.instance }}"
        description: "Server {{ $labels.proxy }}/{{ $labels.server }} @ {{ $labels.instance }} is DOWN"

    - alert: HAproxyServerConnectionErrors
      expr: |
        (
          sum by (proxy, job, instance, server) (rate(haproxy_server_connection_errors_total[5m]))
          /
          sum by (proxy, job, instance, server) (rate(haproxy_server_connection_attempts_total[5m]))
        ) > 0.05
        and
        sum by (proxy, job, instance, server) (rate(haproxy_server_connection_attempts_total[5m])) > 10
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy server connection errors — {{ $labels.proxy }}/{{ $labels.server }} @ {{ $labels.instance }}"
        description: "More than 5% of connection attempts failing on {{ $labels.proxy }}/{{ $labels.server }} @ {{ $labels.instance }} ({{ $value | humanizePercentage }})"

    - alert: HAproxyServerResponseErrors
      expr: ((sum by (server,instance,job) (rate(haproxy_server_http_responses_total{code="5xx"}[5m])) / sum by (server,instance) (rate(haproxy_server_http_responses_total[5m]))) * 100) > 5
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy server response errors — {{ $labels.server }} @ {{ $labels.instance }}"
        description: "Too many 5xx response errors on {{ $labels.server }} @ {{ $labels.instance }} (> 5%)"

    - alert: HAproxyHighHttp5xxErrorRateServer
      expr: ((sum by (server,instance) (rate(haproxy_server_http_responses_total{code="5xx"}[5m])) / sum by (server,instance) (rate(haproxy_server_http_responses_total[5m]))) * 100) > 5
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy high HTTP 5xx error rate — {{ $labels.server }} @ {{ $labels.instance }}"
        description: "Too many HTTP requests with status 5xx (> 5%) on {{ $labels.server }} @ {{ $labels.instance }}"

    - alert: HAproxyHighHttp4xxErrorRateServer
      expr: ((sum by (server,instance) (rate(haproxy_server_http_responses_total{code="4xx"}[5m])) / sum by (server,instance) (rate(haproxy_server_http_responses_total[5m]))) * 100) > 50
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy high HTTP 4xx error rate — {{ $labels.server }} @ {{ $labels.instance }}"
        description: "Too many HTTP requests with status 4xx (> 50%) on {{ $labels.server }} @ {{ $labels.instance }}"

    - alert: HAproxyHighHttp4xxErrorRateServerWarning
      expr: ((sum by (server,instance) (rate(haproxy_server_http_responses_total{code="4xx"}[5m])) / sum by (server,instance) (rate(haproxy_server_http_responses_total[5m]))) * 100) > 15
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy high HTTP 4xx error rate (warning) — {{ $labels.server }} @ {{ $labels.instance }}"
        description: "Too many HTTP requests with status 4xx (> 15%) on {{ $labels.server }} @ {{ $labels.instance }}"

    - alert: HAproxyServerHealthcheckFailure
      expr: increase(haproxy_server_check_failures_total[1m]) > 2
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy server healthcheck failure — {{ $labels.server }} @ {{ $labels.instance }}"
        description: "{{ $value }} healthcheck failures in the last minute on {{ $labels.server }} @ {{ $labels.instance }}"

    - alert: HAproxyServerQueueFull
      expr: haproxy_server_current_queue > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy server queue full — {{ $labels.proxy }}/{{ $labels.server }} @ {{ $labels.instance }}"
        description: "Server {{ $labels.proxy }}/{{ $labels.server }} @ {{ $labels.instance }} has pending queued connections"

    - alert: HAproxyServerDowntimeAccumulating
      expr: increase(haproxy_server_downtime_seconds_total[1h]) > 300
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy server downtime accumulating — {{ $labels.server }} @ {{ $labels.instance }}"
        description: "{{ $labels.server }} @ {{ $labels.instance }} accumulated more than 5 minutes of downtime in the last hour"

    # ── Stick tables ─────────────────────────────────────────

    - alert: HAproxySticktableCritical
      expr: |
        haproxy_sticktable_size > 0
          and
        haproxy_sticktable_used / haproxy_sticktable_size > 0.9
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "HAProxy stick table critical — {{ $labels.name }} @ {{ $labels.instance }}"
        description: "HAProxy stick table {{ $labels.name }} @ {{ $labels.instance }} at 90% capacity — rate limiting and ACLs at risk of failure"

    - alert: HAproxySticktableSaturation
      expr: |
        haproxy_sticktable_size > 0
          and
        haproxy_sticktable_used / haproxy_sticktable_size > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HAProxy stick table near full — {{ $labels.name }} @ {{ $labels.instance }}"
        description: "HAProxy stick table {{ $labels.name }} @ {{ $labels.instance }} at 80% capacity — rate limiting and ACLs may malfunction"
