- name: blackbox.rules
  rules:
    - alert: BlackboxProbeFailed
      expr: probe_success == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Blackbox probe failed (instance {{ $labels.instance }})"
        description: "Probe failed on {{ $labels.instance }}"

    - alert: BlackboxProbeHttpFailure
      expr: probe_http_status_code <= 199 OR probe_http_status_code >= 400
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Blackbox probe HTTP failure (instance {{ $labels.instance }})"
        description: "HTTP status code is not 200-399 on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: BlackboxSslCertificateWillExpireSoon
      expr: 3 <= round((last_over_time(probe_ssl_earliest_cert_expiry[10m]) - time()) / 86400, 0.1) < 20
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Blackbox SSL certificate will expire soon (instance {{ $labels.instance }})"
        description: "SSL certificate expires in less than 20 days on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: BlackboxSslCertificateWillExpireVerySoon
      expr: 0 <= round((last_over_time(probe_ssl_earliest_cert_expiry[10m]) - time()) / 86400, 0.1) < 3
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Blackbox SSL certificate will expire very soon (instance {{ $labels.instance }})"
        description: "SSL certificate expires in less than 3 days on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: BlackboxSslCertificateExpired
      expr: round((last_over_time(probe_ssl_earliest_cert_expiry[10m]) - time()) / 86400, 0.1) < 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Blackbox SSL certificate expired (instance {{ $labels.instance }})"
        description: "SSL certificate has already expired on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: BlackboxProbeSlowHttp
      expr: probe_http_duration_seconds > 1
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "Blackbox probe slow HTTP (instance {{ $labels.instance }})"
        description: "HTTP request took more than 1s on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: BlackboxConfigurationReloadFailure
      expr: blackbox_exporter_config_last_reload_successful != 1
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Blackbox configuration reload failure (instance {{ $labels.instance }})"
        description: "Blackbox configuration reload failed on {{ $labels.instance }}"
