- name: kubernetes.rules
  rules:

    # ── Nodes ─────────────────────────────────────────────────────────────────

    - alert: KubernetesNodeNotReady
      expr: kube_node_status_condition{condition="Ready",status="true"} == 0
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes node not ready ({{ $labels.node }})"
        description: "Node {{ $labels.node }} has been unready for more than 10 minutes"

    - alert: KubernetesNodeMemoryPressure
      expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes node memory pressure ({{ $labels.node }})"
        description: "Node {{ $labels.node }} has MemoryPressure condition"

    - alert: KubernetesNodeDiskPressure
      expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes node disk pressure ({{ $labels.node }})"
        description: "Node {{ $labels.node }} has DiskPressure condition"

    - alert: KubernetesNodeNetworkUnavailable
      expr: kube_node_status_condition{condition="NetworkUnavailable",status="true"} == 1
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes node network unavailable ({{ $labels.node }})"
        description: "Node {{ $labels.node }} has NetworkUnavailable condition"

    - alert: KubernetesNodeOutOfPodCapacity
      expr: |
        sum by (node) (
          (kube_pod_status_phase{phase="Running"} == 1)
          + on(uid, instance) group_left(node) (0 * kube_pod_info{pod_template_hash=""})
        ) / sum by (node) (kube_node_status_allocatable{resource="pods"}) * 100 > 90
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes node out of pod capacity ({{ $labels.node }})"
        description: "Node {{ $labels.node }} is using {{ $value | printf \"%.0f\" }}% of pod capacity"

    - alert: KubernetesNodeSchedulingDisabled
      expr: kube_node_spec_taint{key="node.kubernetes.io/unschedulable"} == 1
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes node scheduling disabled ({{ $labels.node }})"
        description: "Node {{ $labels.node }} has been unschedulable for more than 30 minutes"

    # ── Pods & Containers ─────────────────────────────────────────────────────

    - alert: KubernetesPodNotHealthy
      expr: sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) > 0
      for: 15m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes pod not healthy ({{ $labels.namespace }}/{{ $labels.pod }})"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-running state for more than 15 minutes"

    - alert: KubernetesPodCrashLooping
      expr: increase(kube_pod_container_status_restarts_total[1m]) > 3
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes pod crash looping ({{ $labels.namespace }}/{{ $labels.pod }})"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} is crash looping ({{ $value }} restarts/min)"

    - alert: KubernetesContainerOomKiller
      expr: |
        (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1)
        and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes container OOMKilled ({{ $labels.namespace }}/{{ $labels.pod }})"
        description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes"

    # ── Deployments & StatefulSets ────────────────────────────────────────────

    - alert: KubernetesDeploymentReplicasMismatch
      expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes deployment replicas mismatch ({{ $labels.namespace }}/{{ $labels.deployment }})"
        description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has replica count mismatch for more than 10 minutes"

    - alert: KubernetesDeploymentGenerationMismatch
      expr: kube_deployment_status_observed_generation != kube_deployment_metadata_generation
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes deployment generation mismatch ({{ $labels.namespace }}/{{ $labels.deployment }})"
        description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has failed and has not been rolled back"

    - alert: KubernetesStatefulsetDown
      expr: kube_statefulset_replicas != kube_statefulset_status_replicas_ready > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes StatefulSet down ({{ $labels.namespace }}/{{ $labels.statefulset }})"
        description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has replicas down"

    - alert: KubernetesStatefulsetReplicasMismatch
      expr: kube_statefulset_status_replicas_ready != kube_statefulset_status_replicas
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes StatefulSet replicas mismatch ({{ $labels.namespace }}/{{ $labels.statefulset }})"
        description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} does not match the expected number of replicas"

    - alert: KubernetesStatefulsetGenerationMismatch
      expr: kube_statefulset_status_observed_generation != kube_statefulset_metadata_generation
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes StatefulSet generation mismatch ({{ $labels.namespace }}/{{ $labels.statefulset }})"
        description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has failed and has not been rolled back"

    - alert: KubernetesStatefulsetUpdateNotRolledOut
      expr: |
        max without (revision) (kube_statefulset_status_current_revision unless kube_statefulset_status_update_revision)
        * (kube_statefulset_replicas != kube_statefulset_status_replicas_updated)
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes StatefulSet update not rolled out ({{ $labels.namespace }}/{{ $labels.statefulset }})"
        description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} update has not been fully rolled out"

    - alert: KubernetesReplicasetReplicasMismatch
      expr: kube_replicaset_spec_replicas != kube_replicaset_status_ready_replicas
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes ReplicaSet replicas mismatch ({{ $labels.namespace }}/{{ $labels.replicaset }})"
        description: "ReplicaSet {{ $labels.namespace }}/{{ $labels.replicaset }} replicas mismatch for more than 10 minutes"

    # ── DaemonSets ────────────────────────────────────────────────────────────

    - alert: KubernetesDaemonsetRolloutStuck
      expr: |
        (kube_daemonset_status_number_ready / kube_daemonset_status_desired_number_scheduled * 100 < 100
        and kube_daemonset_status_desired_number_scheduled > 0)
        or kube_daemonset_status_desired_number_scheduled - kube_daemonset_status_current_number_scheduled > 0
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes DaemonSet rollout stuck ({{ $labels.namespace }}/{{ $labels.daemonset }})"
        description: "Some pods of DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} are not scheduled or not ready"

    - alert: KubernetesDaemonsetMisscheduled
      expr: kube_daemonset_status_number_misscheduled > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes DaemonSet misscheduled ({{ $labels.namespace }}/{{ $labels.daemonset }})"
        description: "{{ $value }} pods of DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} are running on nodes where they should not"

    # ── Jobs & CronJobs ───────────────────────────────────────────────────────

    - alert: KubernetesJobFailed
      expr: kube_job_status_failed > 0
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes job failed ({{ $labels.namespace }}/{{ $labels.job_name }})"
        description: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed to complete"

    - alert: KubernetesJobNotStarting
      expr: |
        kube_job_status_active == 0
        and kube_job_status_failed == 0
        and kube_job_status_succeeded == 0
        and (time() - kube_job_status_start_time) > 600
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes job not starting ({{ $labels.namespace }}/{{ $labels.job_name }})"
        description: "Job {{ $labels.namespace }}/{{ $labels.job_name }} did not start for 10 minutes"

    - alert: KubernetesJobSlowCompletion
      expr: kube_job_spec_completions - kube_job_status_succeeded - kube_job_status_failed > 0
      for: 12h
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes job slow completion ({{ $labels.namespace }}/{{ $labels.job_name }})"
        description: "Job {{ $labels.namespace }}/{{ $labels.job_name }} did not complete within 12 hours"

    - alert: KubernetesCronjobFailing
      expr: |
        (kube_cronjob_status_last_schedule_time > kube_cronjob_status_last_successful_time)
        AND (kube_cronjob_status_active == 0)
        AND (kube_cronjob_spec_suspend == 0)
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes CronJob failing ({{ $labels.namespace }}/{{ $labels.cronjob }})"
        description: "CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} last schedule did not complete successfully"

    - alert: KubernetesCronjobTooLong
      expr: |
        kube_job_status_start_time > 0
        and absent(kube_job_status_completion_time)
        and (time() - kube_job_status_start_time) > 3600
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes CronJob running too long ({{ $labels.namespace }}/{{ $labels.cronjob }})"
        description: "CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} is taking more than 1 hour to complete"

    # ── Persistent Volumes ────────────────────────────────────────────────────

    - alert: KubernetesPersistentvolumeclaimPending
      expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes PVC pending ({{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }})"
        description: "PersistentVolumeClaim {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has been pending for more than 2 minutes"

    - alert: KubernetesVolumeOutOfDiskSpace
      expr: kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes * 100 < 10 and kubelet_volume_stats_capacity_bytes > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes volume out of disk space ({{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }})"
        description: "Volume {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has less than 10% free space ({{ $value | printf \"%.1f\" }}%)"

    - alert: KubernetesVolumeFullInFourDays
      expr: predict_linear(kubelet_volume_stats_available_bytes[6h:5m], 4 * 24 * 3600) < 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes volume full in 4 days ({{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }})"
        description: "Volume {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is predicted to be full within 4 days"

    - alert: KubernetesPersistentvolumeError
      expr: kube_persistentvolume_status_phase{phase=~"Failed|Pending"} > 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes PersistentVolume error ({{ $labels.persistentvolume }})"
        description: "PersistentVolume {{ $labels.persistentvolume }} is in {{ $labels.phase }} state"

    # ── HPA ───────────────────────────────────────────────────────────────────

    - alert: KubernetesHpaScaleInability
      expr: |
        (kube_horizontalpodautoscaler_spec_max_replicas - kube_horizontalpodautoscaler_status_desired_replicas)
        * on (horizontalpodautoscaler, namespace)
        (kube_horizontalpodautoscaler_status_condition{condition="ScalingLimited", status="true"} == 1) == 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes HPA cannot scale ({{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }})"
        description: "HPA {{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }} has reached its max replicas and is ScalingLimited"

    - alert: KubernetesHpaMetricsUnavailability
      expr: kube_horizontalpodautoscaler_status_condition{status="false", condition="ScalingActive"} == 1
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes HPA metrics unavailable ({{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }})"
        description: "HPA {{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }} cannot collect metrics — autoscaling is inactive"

    # ── API Server ────────────────────────────────────────────────────────────

    - alert: KubernetesApiServerErrors
      expr: |
        sum(rate(apiserver_request_total{job="apiserver",code=~"5.."}[1m])) by (instance, job)
        / sum(rate(apiserver_request_total{job="apiserver"}[1m])) by (instance, job) * 100 > 3
        and sum(rate(apiserver_request_total{job="apiserver"}[1m])) by (instance, job) > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes API server error rate high ({{ $labels.instance }})"
        description: "Kubernetes API server is experiencing {{ $value | printf \"%.2f\" }}% error rate on {{ $labels.instance }}"

    - alert: KubernetesApiClientErrors
      expr: |
        (sum(rate(rest_client_requests_total{code=~"(4|5).."}[1m])) by (instance, job)
        / sum(rate(rest_client_requests_total[1m])) by (instance, job)) * 100 > 1
        and sum(rate(rest_client_requests_total[1m])) by (instance, job) > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes API client errors ({{ $labels.instance }})"
        description: "API client on {{ $labels.instance }} is experiencing {{ $value | printf \"%.2f\" }}% error rate"

    - alert: KubernetesApiServerLatency
      expr: |
        histogram_quantile(0.99, sum(rate(apiserver_request_duration_seconds_bucket{verb!~"(?:CONNECT|WATCHLIST|WATCH|PROXY)"}[10m])) WITHOUT (subresource)) > 1
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes API server high latency ({{ $labels.instance }})"
        description: "API server p99 latency is {{ $value | printf \"%.2f\" }}s for {{ $labels.verb }} {{ $labels.resource }}"

    - alert: KubernetesClientCertificateExpiresNextWeek
      expr: |
        apiserver_client_certificate_expiration_seconds_count{job="apiserver"} > 0
        and histogram_quantile(0.01, sum by (job, le) (rate(apiserver_client_certificate_expiration_seconds_bucket{job="apiserver"}[5m]))) < 7*24*60*60
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes client certificate expires next week"
        description: "A client certificate used to authenticate to the apiserver expires within 7 days"

    - alert: KubernetesClientCertificateExpiresSoon
      expr: |
        apiserver_client_certificate_expiration_seconds_count{job="apiserver"} > 0
        and histogram_quantile(0.01, sum by (job, le) (rate(apiserver_client_certificate_expiration_seconds_bucket{job="apiserver"}[5m]))) < 24*60*60
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Kubernetes client certificate expires soon"
        description: "A client certificate used to authenticate to the apiserver expires within 24 hours"
