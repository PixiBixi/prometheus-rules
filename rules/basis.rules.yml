    - alert: DownSystemdOpenVPN
      expr: node_systemd_unit_state{state="failed",name="openvpn-client@.*",ignoreOpenVPNDown=""} > 0
      labels:
        severity: critical
      annotations:
        summary: "Systemd unit failed for {{ $labels.name }} @ {{ $labels.instance }}"
        description: "Systemd failed for {{ $labels.name }}, please take a look with `systemctl status {{ $labels.name }}`"
    - alert: DownSystemdKeepalived
      expr: node_systemd_unit_state{state="failed",name="keepalived.service",ignoreKeepalivedDown=""} > 0
      labels:
        severity: critical
      annotations:
        summary: "Systemd unit failed for {{ $labels.name }} @ {{ $labels.instance }}"
        description: "Systemd failed for {{ $labels.name }}, please take a look with `systemctl status {{ $labels.name }}`"

    # CPU
    - alert: CPULoad
      expr: instance:node_cpu_utilization:ratio{ignoreCPULoad="",ignoreSingleCPU=""} > 0.9
      for: 15m
      labels:
        severity: critical
      annotations:
        summary: “Host high CPU load (instance {{ $labels.instance }})”
        description: “The CPU load reported from {{ $labels.instance }} has exceeded 90% for more than 20 minutes.”
    - alert: CPULoadRDS
      # rds-enhanced metric
      expr: node_cpu_average{mode="idle"} < 10
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: “Host high CPU load (instance RDS {{ $labels.instance }})”
        description: “The CPU load reported from RDS {{ $labels.instance }} has exceeded 90% for more than 1 minute.”
    - alert: CPUwaitIO
      expr: instance:node_cpu_utilization:ratio{ignoreCPULoad="",mode="iowait",ignoreSingleCPU=""} > 0.1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High IOWait ({{$value| printf \"%.0f\"}}%) on {{$labels.instance}}"
    - alert: CPULoadServerType
      expr: job:node_cpu_utilization:avg_ratio > 0.80
      for: 15m
      labels:
        severity: critical
      annotations:
        summary: "Host high CPU load for {{ $labels.servertype }} @ {{ $labels.pop }} : {{ $value }}"
        description: "The CPU load reported from {{ $labels.servertype }} on {{ $labels.pop }} has exceeded 80% for more than 15 minutes."

    # ── Filesystem (inodes, predictive) ───────────────────────────────────────

    - alert: NodeFilesystemFilesFillingUp
      expr: |
        (
          node_filesystem_files_free{fstype!="",mountpoint!=""} / node_filesystem_files{fstype!="",mountpoint!=""} * 100 < 40
          and predict_linear(node_filesystem_files_free{fstype!="",mountpoint!=""}[6h], 24*60*60) < 0
          and node_filesystem_readonly{fstype!="",mountpoint!=""} == 0
        )
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "Filesystem inodes filling up on {{ $labels.instance }} ({{ $labels.mountpoint }})"
        description: "Filesystem {{ $labels.device }} mounted on {{ $labels.mountpoint }} at {{ $labels.instance }} is predicted to run out of inodes within 24 hours ({{ printf \"%.2f\" $value }}% free)."
    - alert: NodeFilesystemFilesFillingUp
      expr: |
        (
          node_filesystem_files_free{fstype!="",mountpoint!=""} / node_filesystem_files{fstype!="",mountpoint!=""} * 100 < 20
          and predict_linear(node_filesystem_files_free{fstype!="",mountpoint!=""}[6h], 4*60*60) < 0
          and node_filesystem_readonly{fstype!="",mountpoint!=""} == 0
        )
      for: 1h
      labels:
        severity: critical
      annotations:
        summary: "Filesystem inodes filling up fast on {{ $labels.instance }} ({{ $labels.mountpoint }})"
        description: "Filesystem {{ $labels.device }} mounted on {{ $labels.mountpoint }} at {{ $labels.instance }} is predicted to run out of inodes within 4 hours ({{ printf \"%.2f\" $value }}% free)."

    # ── Network errors ─────────────────────────────────────────────────────────

    - alert: NodeNetworkReceiveErrs
      expr: |
        rate(node_network_receive_errs_total[2m]) / rate(node_network_receive_packets_total[2m]) > 0.01
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "High receive errors on {{ $labels.instance }} ({{ $labels.device }})"
        description: "Interface {{ $labels.device }} at {{ $labels.instance }} has more than 1% receive errors over the last 2 minutes."
    - alert: NodeNetworkTransmitErrs
      expr: |
        rate(node_network_transmit_errs_total[2m]) / rate(node_network_transmit_packets_total[2m]) > 0.01
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "High transmit errors on {{ $labels.instance }} ({{ $labels.device }})"
        description: "Interface {{ $labels.device }} at {{ $labels.instance }} has more than 1% transmit errors over the last 2 minutes."

    # ── NIC bandwidth saturation ───────────────────────────────────────────────

    - alert: NodeNICReceiveBandwidthSaturation
      expr: |
        rate(node_network_receive_bytes_total{device!~"lo|veth.*|cali.*|cilium.*|docker.*|virbr.*"}[5m])
        / (node_network_speed_bytes{device!~"lo|veth.*|cali.*|cilium.*|docker.*|virbr.*"} > 0)
        > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "NIC receive saturation on {{ $labels.instance }} ({{ $labels.device }})"
        description: "Interface {{ $labels.device }} at {{ $labels.instance }} receive utilization is {{ $value | humanizePercentage }} of link capacity (warning threshold: 80%)."
    - alert: NodeNICReceiveBandwidthSaturation
      expr: |
        rate(node_network_receive_bytes_total{device!~"lo|veth.*|cali.*|cilium.*|docker.*|virbr.*"}[5m])
        / (node_network_speed_bytes{device!~"lo|veth.*|cali.*|cilium.*|docker.*|virbr.*"} > 0)
        > 0.9
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "NIC receive saturation critical on {{ $labels.instance }} ({{ $labels.device }})"
        description: "Interface {{ $labels.device }} at {{ $labels.instance }} receive utilization is {{ $value | humanizePercentage }} of link capacity (critical threshold: 90%)."
    - alert: NodeNICTransmitBandwidthSaturation
      expr: |
        rate(node_network_transmit_bytes_total{device!~"lo|veth.*|cali.*|cilium.*|docker.*|virbr.*"}[5m])
        / (node_network_speed_bytes{device!~"lo|veth.*|cali.*|cilium.*|docker.*|virbr.*"} > 0)
        > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "NIC transmit saturation on {{ $labels.instance }} ({{ $labels.device }})"
        description: "Interface {{ $labels.device }} at {{ $labels.instance }} transmit utilization is {{ $value | humanizePercentage }} of link capacity (warning threshold: 80%)."
    - alert: NodeNICTransmitBandwidthSaturation
      expr: |
        rate(node_network_transmit_bytes_total{device!~"lo|veth.*|cali.*|cilium.*|docker.*|virbr.*"}[5m])
        / (node_network_speed_bytes{device!~"lo|veth.*|cali.*|cilium.*|docker.*|virbr.*"} > 0)
        > 0.9
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "NIC transmit saturation critical on {{ $labels.instance }} ({{ $labels.device }})"
        description: "Interface {{ $labels.device }} at {{ $labels.instance }} transmit utilization is {{ $value | humanizePercentage }} of link capacity (critical threshold: 90%)."

    # ── Clock skew ─────────────────────────────────────────────────────────────

    - alert: NodeClockSkewDetected
      expr: |
        (
          node_timex_offset_seconds > 0.05
          and deriv(node_timex_offset_seconds[5m]) >= 0
        )
        or
        (
          node_timex_offset_seconds < -0.05
          and deriv(node_timex_offset_seconds[5m]) <= 0
        )
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Clock skew detected on {{ $labels.instance }}"
        description: "Clock at {{ $labels.instance }} is out of sync by more than 0.05s and diverging. Check NTP configuration."

    # ── File descriptors ───────────────────────────────────────────────────────

    - alert: NodeFileDescriptorLimit
      expr: node_filefd_allocated * 100 / node_filefd_maximum > 70
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "File descriptor limit approaching on {{ $labels.instance }}"
        description: "{{ $labels.instance }} is using {{ printf \"%.2f\" $value }}% of available file descriptors (warning threshold: 70%)."
    - alert: NodeFileDescriptorLimit
      expr: node_filefd_allocated * 100 / node_filefd_maximum > 90
      for: 15m
      labels:
        severity: critical
      annotations:
        summary: "File descriptor limit critical on {{ $labels.instance }}"
        description: "{{ $labels.instance }} is using {{ printf \"%.2f\" $value }}% of available file descriptors (critical threshold: 90%)."

    # ── Memory pressure ────────────────────────────────────────────────────────

    - alert: NodeMemoryMajorPagesFaults
      expr: |
        (
          rate(node_vmstat_pgmajfault[5m])
          /
          rate(node_vmstat_pgfault[5m])
        ) > 0.05
        and
        rate(node_vmstat_pgfault[5m]) > 100
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Memory major page faults high on {{ $labels.instance }}"
        description: "More than 5% of page faults require disk I/O on {{ $labels.instance }} ({{ $value | humanizePercentage }}) — possible memory pressure or thrashing"

    # ── Disk IO ────────────────────────────────────────────────────────────────

    - alert: NodeDiskIOSaturation
      expr: rate(node_disk_io_time_seconds_total{device!=""}[5m]) > 0.9
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "Disk IO saturation on {{ $labels.instance }} ({{ $labels.device }})"
        description: "Disk {{ $labels.device }} at {{ $labels.instance }} is busy more than 90% of the time for 30 minutes ({{ $value | humanizePercentage }}) — possible disk saturation."

    # ── Systemd crashloop ──────────────────────────────────────────────────────

    - alert: NodeSystemdServiceCrashlooping
      expr: increase(node_systemd_service_restart_total[5m]) > 2
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Systemd service crash looping on {{ $labels.instance }}"
        description: "Service {{ $labels.name }} at {{ $labels.instance }} has restarted more than twice in 5 minutes."

    # ── Hardware temperature ───────────────────────────────────────────────────

    - alert: NodeHardwareTemperatureTooHigh
      expr: node_hwmon_temp_celsius >= node_hwmon_temp_crit_celsius
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Critical hardware temperature on {{ $labels.instance }} ({{ $labels.chip }}/{{ $labels.sensor }})"
        description: Hardware temperature on {{ $labels.instance }} sensor {{ $labels.chip }}/{{ $labels.sensor }} has reached critical threshold ({{ $value }}C).

    - alert: NodeHardwareTemperatureWarning
      expr: node_hwmon_temp_celsius >= node_hwmon_temp_max_celsius
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High hardware temperature on {{ $labels.instance }} ({{ $labels.chip }}/{{ $labels.sensor }})"
        description: Hardware temperature on {{ $labels.instance }} sensor {{ $labels.chip }}/{{ $labels.sensor }} above max threshold ({{ $value }}C).

    # ── RAID recovery ──────────────────────────────────────────────────────────

    - alert: NodeRaidRecovering
      expr: node_md_state{state="recovering"} == 1
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "RAID array recovering on {{ $labels.instance }} ({{ $labels.device }})"
        description: RAID array {{ $labels.device }} on {{ $labels.instance }} is recovering. Monitor progress.

    # ── Network carrier ────────────────────────────────────────────────────────

    - alert: NodeNetworkLinkDown
      expr: node_network_carrier{device!~"lo|veth.*|docker.*|br-.*|virbr.*|tun.*"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Network link down on {{ $labels.instance }} ({{ $labels.device }})"
        description: Network interface {{ $labels.device }} on {{ $labels.instance }} has lost carrier.

    - alert: NodeNetworkInterfaceFlapping
      expr: changes(node_network_carrier{device!~"lo|veth.*|docker.*|br-.*|virbr.*|tun.*"}[5m]) > 2
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Network interface flapping on {{ $labels.instance }} ({{ $labels.device }})"
        description: Network interface {{ $labels.device }} on {{ $labels.instance }} is flapping ({{ $value }} carrier changes in 5 minutes).

    # ── Memory corruption ──────────────────────────────────────────────────────

    - alert: NodeMemoryHardwareCorrupted
      expr: node_memory_HardwareCorrupted_bytes > 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Hardware memory corruption detected on {{ $labels.instance }}"
        description: Hardware memory corruption detected on {{ $labels.instance }} ({{ $value | humanize1024 }}). Schedule hardware replacement.

    # ── TCP sockets ────────────────────────────────────────────────────────────

    - alert: NodeTCPOrphanSockets
      expr: |
        (node_sockstat_TCP_orphan / node_sockstat_TCP_alloc) > 0.10
        and node_sockstat_TCP_alloc > 100
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High TCP orphan sockets on {{ $labels.instance }}"
        description: "More than 10% of allocated TCP sockets are orphaned on {{ $labels.instance }} ({{ $value | humanizePercentage }}) — possible TCP connection leak"

    # ── Systemd system status ──────────────────────────────────────────────────

    - alert: NodeSystemdNotRunning
      expr: node_systemd_system_running == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "systemd not fully operational on {{ $labels.instance }}"
        description: systemd reports system is not fully operational on {{ $labels.instance }}.

    # ── Bonding ────────────────────────────────────────────────────────────────

    - alert: NodeBondingDegraded
      expr: (node_bonding_slaves - node_bonding_active) != 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Bonding interface degraded on {{ $labels.instance }}"
        description: "Bonding interface {{ $labels.master }} at {{ $labels.instance }} has slave failures."

    # ── Swap ───────────────────────────────────────────────────────────────────

    - alert: NodeSwapSaturation
      expr: |
        node_memory_SwapTotal_bytes > 0
          and
        (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) / node_memory_SwapTotal_bytes > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Swap usage high on {{ $labels.instance }}"
        description: "Swap is more than 80% used on {{ $labels.instance }} — memory pressure likely."

    - alert: NodeSwapSaturationCritical
      expr: |
        node_memory_SwapTotal_bytes > 0
          and
        (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) / node_memory_SwapTotal_bytes > 0.9
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Swap almost exhausted on {{ $labels.instance }}"
        description: "Swap is more than 90% used on {{ $labels.instance }} — OOM risk imminent."

    - alert: NodeActiveSwapping
      expr: rate(node_vmstat_pswpin[5m]) + rate(node_vmstat_pswpout[5m]) > 256
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Active swapping on {{ $labels.instance }}"
        description: "{{ $labels.instance }} is actively swapping ({{ $value | humanize }} pages/sec) — RAM exhausted, severe performance degradation."

    # ── I/O pressure ───────────────────────────────────────────────────────────

    - alert: NodeProcsBlocked
      expr: node_procs_blocked > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Processes blocked on I/O on {{ $labels.instance }}"
        description: "{{ $value }} processes blocked waiting for I/O on {{ $labels.instance }} — possible disk saturation or hung device."

    # ── TCP kernel drops ───────────────────────────────────────────────────────

    - alert: NodeTCPListenOverflows
      expr: rate(node_netstat_TcpExt_ListenOverflows[5m]) > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "TCP listen queue overflows on {{ $labels.instance }}"
        description: "{{ $labels.instance }} is dropping connections due to full TCP listen queue — application cannot accept connections fast enough."

    # ── Softnet drops ──────────────────────────────────────────────────────────

    - alert: NodeSoftnetDrops
      expr: rate(node_softnet_dropped_total[5m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Kernel softnet drops on {{ $labels.instance }}"
        description: "{{ $labels.instance }} is dropping packets at the kernel NIC ring buffer level — possible NIC saturation or insufficient RX buffer."

    # ── Filesystem health ──────────────────────────────────────────────────────

    - alert: NodeFilesystemReadonly
      expr: node_filesystem_readonly{fstype!~"(tmpfs|iso9660|squashfs)",mountpoint!~"(/boot|/boot/efi)"} == 1
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Filesystem remounted read-only on {{ $labels.instance }}"
        description: "Filesystem {{ $labels.device }} mounted on {{ $labels.mountpoint }} at {{ $labels.instance }} is read-only — possible disk error or kernel panic."

    - alert: NodeFilesystemDeviceError
      expr: node_filesystem_device_error{fstype!~"(tmpfs|iso9660|squashfs)"} > 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Filesystem device error on {{ $labels.instance }}"
        description: "Filesystem {{ $labels.device }} mounted on {{ $labels.mountpoint }} at {{ $labels.instance }} reports a device error."

    # ── UDP buffer errors ──────────────────────────────────────────────────────

    - alert: NodeUDPReceiveBufferErrors
      expr: rate(node_netstat_Udp_RcvbufErrors[5m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "UDP receive buffer errors on {{ $labels.instance }}"
        description: "{{ $labels.instance }} is dropping UDP packets due to full receive buffers — consider increasing net.core.rmem_max."
