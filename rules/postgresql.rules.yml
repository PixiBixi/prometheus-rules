- name: postgresql.rules
  rules:
    - alert: PostgresExporter
      expr: sum(up{job=~".*postgres.*"}) by (job,instance) == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Job {{ $labels.job }} having an issue on {{ $labels.instance }}"
        description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 2 minutes."

    - alert: PostrgreSQLDown
      expr: sum(pg_up) by (instance,job) == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.job }}/{{ $labels.instance }} cant be scraped, assume its down. Check if PGSQL is UP or user `prometheus` exists"
        summary: "{{ $labels.job }}/{{ $labels.instance }} cant be scraped"
    - alert: PostgreSQLMaxConnectionsReached
      expr: |
        sum by (instance,job) (pg_stat_activity_count) >=
        (sum by (instance,job) (pg_settings_max_connections)-
        sum by (instance,job) (pg_settings_superuser_reserved_connections))
      for: 1m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} is exceeding the currently configured maximum Postgres connection limit (current value: {{ $value }}). Services may be degraded - please take immediate action (you probably need to increase max_connections in the configuration)"
        summary: "{{ $labels.instance }} has maxed out Postgres connections."
    - alert: "PostgreSQLHighConnections"
      expr: |
        sum by (instance,job) (pg_stat_activity_count) >
        (
          sum by (instance,job) (pg_settings_max_connections)
          -
          sum by (instance,job) (pg_settings_superuser_reserved_connections)
        ) * 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        description: "{{ $labels.instance }} is exceeding 80% of the currently configured maximum PostgreSQL connection limit (current value: {{ $value }}s). Please check utilization graphs and confirm if this is normal service growth, abuse or an otherwise temporary condition or if new resources need to be provisioned (or the limits increased, which is mostly likely)."
        summary: "{{ $labels.instance }} is over 80% of max Postgres connections."
    - alert: PostgreSQLSlowQueries
      expr: |
        avg by (datname,instance) (
          rate (
            pg_stat_activity_max_tx_duration{datname!~"template.*"}[2m]
          )
        ) > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        description: "PostgreSQL high number of slow queries {{ $labels.instance }} for database {{ $labels.datname }} with a value of {{ $value }} "
        summary: "PostgreSQL high number of slow on {{ $labels.instance }} for database {{ $labels.datname }} "
        utility: garbage
    - alert: PostgreSQLSlowQueries
      expr: |
        avg by (datname,instance) (
          rate (
            pg_stat_activity_max_tx_duration{datname!~"template.*"}[2m]
          )
        ) > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        description: "PostgreSQL high number of slow queries {{ $labels.instance }} for database {{ $labels.datname }} with a value of {{ $value }} "
        summary: "PostgreSQL high number of slow on {{ $labels.instance }} for database {{ $labels.datname }} "
        utility: garbage
    - alert: PostgreSQLHighQPS
      expr: |
        avg by (datname,instance) (
          irate(
            pg_stat_database_xact_commit{datname!~"template.*"}[5m]
          )
          +
          irate(
            pg_stat_database_xact_rollback{datname!~"template.*"}[5m]
          )
        ) > 10000
      for: 5m
      labels:
        severity: warning
      annotations:
        description: "PostgreSQL high number of queries per second on {{ $labels.datname }}/{{ $labels.instance }} for database {{ $labels.datname }} with a value of {{ $value }}"
        summary: "PostgreSQL high number of queries per second {{ $labels.datname }}/{{ $labels.instance }} for database {{ $labels.datname }}"
        utility: garbage
    - alert: PostgreSQLHighQPS
      expr: |
        avg by (datname,instance) (
          irate(
            pg_stat_database_xact_commit{datname!~"template.*"}[5m]
          )
          +
          irate(
            pg_stat_database_xact_rollback{datname!~"template.*"}[5m]
          )
        ) > 8000
      for: 5m
      labels:
        severity: critical
      annotations:
        description: "PostgreSQL high number of queries per second on {{ $labels.instance }} for database {{ $labels.datname }} with a value of {{ $value }}"
        summary: "PostgreSQL high number of queries per second {{ $labels.instance }} for database {{ $labels.datname }}"
        utility: garbage
    - alert: PostgreSQLRepliDown
      expr: sum(pg_replication_slots_active) by (instance,job,slot_name) < 1
      for: 5m
      labels:
        severity: critical
      annotations:
        description: "PostgreSQL replication down for {{ $labels.instance }} / {{ $labels.slot_name}} "
        summary: "PostgreSQL replication down for {{ $labels.instance }} / {{ $labels.slot_name}} "
    - alert: PostgreSQLRepliLag
      expr: sum(replication_lag) by (instance,job) > 10
      for: 10m
      labels:
        severity: info
        utility: garbage
      annotations:
        description: "PostgreSQL replication is high (> 10s) for 10 minuts on {{ $labels.instance }}"
        summary: "PostgreSQL replication high for {{ $labels.instance }}"
    - alert: PostgreSQLRepliLag
      expr: sum(replication_lag) by (instance,job) > 10
      for: 40m
      labels:
        severity: critical
      annotations:
        description: "PostgreSQL replication is high (> 10s) for 10 minuts on {{ $labels.instance }}"
        summary: "PostgreSQL replication high for {{ $labels.instance }}"

    - alert: PostgresqlDeadLocks
      expr: increase(pg_stat_database_deadlocks{datname!~"template.*|postgres",datid!="0"}[1m]) > 5
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL dead locks (instance {{ $labels.instance }})"
        description: "PostgreSQL has {{ $value }} dead-locks in the last minute on {{ $labels.instance }}"

    - alert: PostgresqlHighRollbackRate
      expr: |
        sum by (namespace,datname,instance) (rate(pg_stat_database_xact_rollback{datname!~"template.*|postgres",datid!="0"}[3m]))
        / (
          sum by (namespace,datname,instance) (rate(pg_stat_database_xact_rollback{datname!~"template.*|postgres",datid!="0"}[3m]))
          + sum by (namespace,datname,instance) (rate(pg_stat_database_xact_commit{datname!~"template.*|postgres",datid!="0"}[3m]))
        ) > 0.02
        and (
          sum by (namespace,datname,instance) (rate(pg_stat_database_xact_rollback{datname!~"template.*|postgres",datid!="0"}[3m]))
          + sum by (namespace,datname,instance) (rate(pg_stat_database_xact_commit{datname!~"template.*|postgres",datid!="0"}[3m]))
        ) > 0
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL high rollback rate (instance {{ $labels.instance }})"
        description: "Ratio of rollbacks vs commits > 2% on {{ $labels.instance }}/{{ $labels.datname }}\n  VALUE = {{ $value }}"

    - alert: PostgresqlTooManyDeadTuples
      expr: ((pg_stat_user_tables_n_dead_tup > 10000) / (pg_stat_user_tables_n_live_tup + pg_stat_user_tables_n_dead_tup)) >= 0.1 and (pg_stat_user_tables_n_live_tup + pg_stat_user_tables_n_dead_tup) > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL too many dead tuples (instance {{ $labels.instance }})"
        description: "Dead tuples ratio >= 10% on {{ $labels.instance }} table {{ $labels.relname }} — VACUUM may be needed"

    - alert: PostgresqlTooManyLocksAcquired
      expr: ((sum by (instance) (pg_locks_count)) / (pg_settings_max_locks_per_transaction * pg_settings_max_connections)) > 0.20 and (pg_settings_max_locks_per_transaction * pg_settings_max_connections) > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "PostgreSQL too many locks acquired (instance {{ $labels.instance }})"
        description: "More than 20% of max_locks_per_transaction used on {{ $labels.instance }} — consider increasing max_locks_per_transaction"

    - alert: PostgresqlTableNotAutoVacuumed
      expr: |
        ((pg_stat_user_tables_n_tup_del + pg_stat_user_tables_n_tup_upd + pg_stat_user_tables_n_tup_hot_upd) > pg_settings_autovacuum_vacuum_threshold)
        and (time() - pg_stat_user_tables_last_autovacuum) > 60 * 60 * 24 * 10
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL table not auto vacuumed (instance {{ $labels.instance }})"
        description: "Table {{ $labels.relname }} has not been auto vacuumed for 10 days on {{ $labels.instance }}"

    - alert: PostgresqlUnusedReplicationSlot
      expr: (pg_replication_slots_active == 0) and (pg_replication_is_replica == 0)
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL unused replication slot (instance {{ $labels.instance }})"
        description: "Inactive replication slot on {{ $labels.instance }} — will prevent WAL cleanup and may fill disk"

    - alert: PostgresqlBloatIndexHigh
      expr: pg_bloat_btree_bloat_pct > 80 and on (idxname) (pg_bloat_btree_real_size > 100000000)
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL bloat index high (instance {{ $labels.instance }})"
        description: "Index {{ $labels.idxname }} bloat > 80% on {{ $labels.instance }} — run: REINDEX INDEX CONCURRENTLY {{ $labels.idxname }}"

    - alert: PostgresqlBloatTableHigh
      expr: pg_bloat_table_bloat_pct > 80 and on (relname) (pg_bloat_table_real_size > 200000000)
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL bloat table high (instance {{ $labels.instance }})"
        description: "Table {{ $labels.relname }} bloat > 80% on {{ $labels.instance }} — run: VACUUM {{ $labels.relname }}"

    - alert: PostgresqlInvalidIndex
      expr: pg_general_index_info_pg_relation_size{indexrelname=~".*ccnew.*"}
      for: 6h
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL invalid index (instance {{ $labels.instance }})"
        description: "Table {{ $labels.relname }} has invalid index {{ $labels.indexrelname }} on {{ $labels.instance }} — run: DROP INDEX {{ $labels.indexrelname }}"

    - alert: PostgresExporterScrapeFailed
      expr: pg_exporter_last_scrape_error == 1
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "PostgreSQL exporter scrape failed (instance {{ $labels.instance }})"
        description: "postgres_exporter cannot scrape {{ $labels.instance }}"

    - alert: PostgresReplicationLagHigh
      expr: pg_replication_lag > 30
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL replication lag high (server {{ $labels.server }})"
        description: "Replication lag on {{ $labels.server }} is {{ $value | humanizeDuration }}. Replica is falling behind."

    - alert: PostgresReplicationLagCritical
      expr: pg_replication_lag > 300
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "PostgreSQL replication lag critical (server {{ $labels.server }})"
        description: "Replication lag on {{ $labels.server }} is {{ $value | humanizeDuration }}. Replica is severely behind."

    - alert: PostgresWALArchiveFailing
      expr: increase(pg_stat_archiver_failed_count[5m]) > 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "PostgreSQL WAL archive failing (server {{ $labels.server }})"
        description: "WAL archiving failures on {{ $labels.server }}. PITR recovery may be broken."

    - alert: PostgresWALArchiveStale
      expr: pg_stat_archiver_last_archive_age > 3600
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL WAL archive stale (server {{ $labels.server }})"
        description: "Last successful WAL archive on {{ $labels.server }} was {{ $value | humanizeDuration }} ago. Check archive destination."

    - alert: PostgresConnectionsSaturation
      expr: sum by (server) (pg_stat_database_numbackends) / pg_settings_max_connections > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL connections saturation (server {{ $labels.server }})"
        description: "PostgreSQL connection usage above 80% of max_connections on {{ $labels.server }}."

    - alert: PostgresDeadlockHigh
      expr: increase(pg_stat_database_deadlocks[5m]) > 10
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL deadlock high (database {{ $labels.datname }})"
        description: "More than 10 deadlocks detected in 5 minutes on database {{ $labels.datname }}."

    - alert: PostgresChecksumFailures
      expr: increase(pg_stat_database_checksum_failures[5m]) > 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "PostgreSQL checksum failures (database {{ $labels.datname }})"
        description: "Data checksum failure detected on {{ $labels.datname }} — possible disk corruption."

    - alert: PostgresTempFilesHigh
      expr: rate(pg_stat_database_temp_bytes[5m]) > 100000000
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL temp files high (database {{ $labels.datname }})"
        description: "Database {{ $labels.datname }} is writing more than 100MB/min to temp files — query memory pressure, check work_mem."

    - alert: PostgresBackendFsyncHigh
      expr: rate(pg_stat_bgwriter_buffers_backend_fsync_total[5m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL backend fsync high (instance {{ $labels.instance }})"
        description: "Backend processes are performing fsync themselves on {{ $labels.instance }} — bgwriter cannot keep up."

    - alert: PostgresDatabaseSizeGrowthHigh
      expr: predict_linear(pg_database_size_bytes[6h], 86400) - pg_database_size_bytes > 10737418240
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL database size growth high (database {{ $labels.datname }})"
        description: "Database {{ $labels.datname }} projected to grow by more than 10GB in 24h at current rate."

