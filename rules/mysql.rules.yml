- name: mysql.rules
  rules:
    - alert: MySQLReplicationDown
      expr: sum(mysql_slave_status_slave_sql_running + mysql_slave_status_slave_io_running) by (instance,master_host,job) < 2
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "MySQL Replication is not running {{$labels.instance}}"
        description: "MySQL replication seems down on {{$labels.instance}}"
    - alert: MysqlExporter
      expr: sum(up{job=~".*mysql-exporter"}) by (job,instance) == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 2 minutes."
        summary: "Job {{ $labels.job }} having an issue on {{ $labels.instance }}"
    - alert: MysqlDown
      expr: mysql_up == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        description: "Mysql on {{ $labels.instance }} of job {{ $labels.job }} has been down for more than 2 minutes."
        summary: "Mysql having an issue on {{ $labels.instance }}"
    - alert: MysqlConnectionErrors
      expr: sum(rate(mysql_global_status_connection_errors_total[5m])) by (job,instance) > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} of job {{ $labels.job }} has connection errors"
        summary: "{{ $labels.instance }} has connection errors for more than 2 minutes. {{ $value }}"

    # Galera
    - alert: GaleraWrongSize
      expr: sum(mysql_global_status_wsrep_cluster_size) by (job,instance) < 3
      for: 2m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} of job {{ $labels.job }} missing Galera instances {{ $value }}"
        summary: "{{ $labels.instance }} of job {{ $labels.job }} missing Galera instances {{ $value }}"
    - alert: GaleraNodeUnhealthy
      expr: sum(mysql_global_status_wsrep_cluster_status) by (job,instance) != 1
      for: 2m
      labels:
        severity: critical
      annotations:
        description: "{{ $labels.instance }} of job {{ $labels.job }} unhealthy node"
        summary: "{{ $labels.instance }} of job {{ $labels.job }} unhealthy node"
    - alert: GaleraOutOfSync
      expr: mysql_global_status_wsrep_local_state != 4 and mysql_global_variables_wsrep_desync == 0
      for: 5m
      labels:
        severity: warning
      annotations:
        description: "{{$labels.job}} on {{$labels.instance}} is not in sync ({{$value}} != 4)."
        summary: "Galera cluster node out of sync."
    - alert: GaleraDonorFallingBehind
      expr: mysql_global_status_wsrep_local_state == 2 and mysql_global_status_wsrep_local_recv_queue > 100
      for: 5m
      labels:
        severity: warning
      annotations:
        description: "{{$labels.job}} on {{$labels.instance}} is a donor (hotbackup) and is falling behind (queue size {{$value}})."
        summary: "Galera cluster donor node falling behind."
    - alert: GaleraNotReady
      expr: mysql_global_status_wsrep_ready != 1
      for: 5m
      labels:
        severity: critical
      annotations:
        description: "{{$labels.job}} on {{$labels.instance}} is not ready."
        summary: "Galera cluster node not ready"
    - alert: MySQLInnoDBLogWaits
      expr: |
        (
          rate(mysql_global_status_innodb_log_waits[15m])
          /
          rate(mysql_global_status_innodb_log_write_requests[15m])
        ) > 0.01
        and
        rate(mysql_global_status_innodb_log_write_requests[15m]) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "MySQL InnoDB log writes stalling (instance {{ $labels.instance }})"
        description: "More than 1% of InnoDB log write requests are waiting for disk on {{ $labels.instance }} ({{ $value | humanizePercentage }}) — consider increasing innodb_log_buffer_size"

    - alert: MysqlTooManyConnections
      expr: max_over_time(mysql_global_status_threads_connected[1m]) / mysql_global_variables_max_connections * 100 > 80 and mysql_global_variables_max_connections > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "MySQL too many connections (instance {{ $labels.instance }})"
        description: "More than 80% of MySQL connections are in use on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: MysqlHighThreadsRunning
      expr: max_over_time(mysql_global_status_threads_running[1m]) / mysql_global_variables_max_connections * 100 > 60 and mysql_global_variables_max_connections > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "MySQL high threads running (instance {{ $labels.instance }})"
        description: "More than 60% of MySQL connections are in running state on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: MysqlHighPreparedStatementsUtilization
      expr: max_over_time(mysql_global_status_prepared_stmt_count[1m]) / mysql_global_variables_max_prepared_stmt_count * 100 > 80 and mysql_global_variables_max_prepared_stmt_count > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "MySQL high prepared statements utilization (instance {{ $labels.instance }})"
        description: "High utilization of prepared statements (> 80%) on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: MysqlSlowQueries
      expr: delta(mysql_global_status_slow_queries[1m]) > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "MySQL slow queries (instance {{ $labels.instance }})"
        description: "MySQL server has new slow queries ({{ $value }} in the last minute) on {{ $labels.instance }}"

    - alert: MysqlTooManyOpenFiles
      expr: mysql_global_status_innodb_num_open_files / mysql_global_variables_open_files_limit * 100 > 75 and mysql_global_variables_open_files_limit > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "MySQL too many open files (instance {{ $labels.instance }})"
        description: "MySQL open files > 75% of open_files_limit on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: MysqlInnodbForceRecoveryEnabled
      expr: mysql_global_variables_innodb_force_recovery != 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "MySQL InnoDB force recovery enabled (instance {{ $labels.instance }})"
        description: "innodb_force_recovery is enabled on {{ $labels.instance }} — should only be set temporarily for crash recovery"

    - alert: MysqlInnodbHistoryLenTooLong
      expr: mysql_info_schema_innodb_metrics_transaction_trx_rseg_history_len > 50000
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "MySQL InnoDB history_len too long (instance {{ $labels.instance }})"
        description: "InnoDB undo log (history_len) is too long ({{ $value }}) on {{ $labels.instance }} — long-running transactions suspected"

