- name: cert-manager.rules
  rules:
    - alert: CertManagerAbsent
      expr: absent(up{job="cert-manager"})
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Cert Manager absent from service discovery"
        description: "Cert Manager has disappeared. No certificates can be minted or renewed until it is back."
        runbook_url: https://github.com/imusmanmalik/cert-manager-mixin/blob/main/RUNBOOK.md#certmanagerabsent

    - alert: CertManagerCertExpirySoon
      expr: |
        avg by (exported_namespace, namespace, name) (
          (certmanager_certificate_expiration_timestamp_seconds - time())
          and on (exported_namespace, namespace, name)
          (certmanager_certificate_ready_status{condition="True"} == 1)
        )
        <
        avg by (exported_namespace, namespace, name) (
          certmanager_certificate_expiration_timestamp_seconds - certmanager_certificate_renewal_timestamp_seconds
        ) * 0.7
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "Certificate {{ $labels.name }} expiring soon ({{ $value | humanizeDuration }})"
        description: "Certificate {{ $labels.name }} in namespace {{ $labels.exported_namespace }} has not been renewed and is {{ $value | humanizeDuration }} from expiry."
        runbook_url: https://github.com/imusmanmalik/cert-manager-mixin/blob/main/RUNBOOK.md#certmanagercertexpirysoon

    - alert: CertManagerCertNotReady
      expr: |
        max by (name, exported_namespace, namespace, condition) (
          certmanager_certificate_ready_status{condition!="True"} == 1
        )
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Certificate {{ $labels.name }} not ready"
        description: "Certificate {{ $labels.name }} in namespace {{ $labels.exported_namespace }} is not ready (condition={{ $labels.condition }}) for more than 10 minutes."
        runbook_url: https://github.com/imusmanmalik/cert-manager-mixin/blob/main/RUNBOOK.md#certmanagercertnotready

    - alert: CertManagerHittingRateLimits
      expr: |
        sum by (host) (
          rate(certmanager_http_acme_client_request_count{status="429"}[5m])
        ) > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Cert Manager hitting Let's Encrypt rate limits on {{ $labels.host }}"
        description: "Cert Manager is receiving HTTP 429 from Let's Encrypt for {{ $labels.host }}. Rate limit can block certificate issuance for up to 7 days."
        runbook_url: https://github.com/imusmanmalik/cert-manager-mixin/blob/main/RUNBOOK.md#certmanagerhittingratelimits
