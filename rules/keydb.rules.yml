- name: redis.rules
  rules:
    - alert: RedisDown
      expr: sum(redis_up) by (instance,job) != 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Redis is down for {{ $labels.instance }}"
        description: "Redis is down for {{ $labels.instance }} for more than 5 minuts."
    - alert: RedisOutOfMemory
      expr: (redis_memory_used_bytes / redis_memory_max_bytes * 100) > 90
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Redis out of memory for instance {{ $labels.instance }}"
        description: "Redis will be soon out of memory (> 90%)\n  VALUE = {{ $value }}"
    - alert: RedisClusterSlotFail
      expr: redis_cluster_slots_fail > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Number of hash slots mapping to a node in FAIL state for instance {{ $labels.instance }}"
        description: "Redis cluster has slots fail\n  VALUE = {{ $value }}"
    - alert: RedisClusterStateNotOk
      expr: redis_cluster_state == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Redis cluster state is not ok for instance {{ $labels.instance }}"
        description: "Redis cluster is not ok"

    - alert: RedisMissingMaster
      expr: (count(redis_instance_info{role="master"}) or vector(0)) < 1
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Redis missing master (instance {{ $labels.instance }})"
        description: "Redis cluster has no node marked as master"

    - alert: RedisTooManyMasters
      expr: count(redis_instance_info{role="master"}) > 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Redis too many masters (instance {{ $labels.instance }})"
        description: "Redis cluster has more than one master node"

    - alert: RedisDisconnectedSlaves
      expr: count without (instance, job) (redis_connected_slaves) - sum without (instance, job) (redis_connected_slaves) - 1 > 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Redis disconnected slaves (instance {{ $labels.instance }})"
        description: "Redis not replicating for all slaves on {{ $labels.instance }}"

    - alert: RedisReplicationBroken
      expr: delta(redis_connected_slaves[1m]) < 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Redis replication broken (instance {{ $labels.instance }})"
        description: "Redis instance lost a slave on {{ $labels.instance }}"

    - alert: RedisClusterFlapping
      expr: changes(redis_connected_slaves[1m]) > 1
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Redis cluster flapping (instance {{ $labels.instance }})"
        description: "Redis replica connections are flapping on {{ $labels.instance }}"

    - alert: RedisMissingBackup
      expr: time() - redis_rdb_last_save_timestamp_seconds > 60 * 60 * 48
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Redis missing backup (instance {{ $labels.instance }})"
        description: "Redis has not been backed up for 48 hours on {{ $labels.instance }}"

    - alert: RedisOutOfConfiguredMaxmemory
      expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 90 and on(instance) redis_memory_max_bytes > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Redis out of configured maxmemory (instance {{ $labels.instance }})"
        description: "Redis is running out of configured maxmemory (> 90%) on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: RedisTooManyConnections
      expr: redis_connected_clients / redis_config_maxclients * 100 > 90 and redis_config_maxclients > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Redis too many connections (instance {{ $labels.instance }})"
        description: "Redis connections > 90% of maxclients on {{ $labels.instance }}\n  VALUE = {{ $value }}"

    - alert: RedisRejectedConnections
      expr: increase(redis_rejected_connections_total[1m]) > 5
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Redis rejected connections (instance {{ $labels.instance }})"
        description: "Some connections to Redis were rejected on {{ $labels.instance }}\n  VALUE = {{ $value }}"
