repos:
  - repo: local
    hooks:
      - id: build-docs
        name: Build docs/data.json
        language: system
        entry: bash -c 'python3 build.py && git add docs/data.json'
        pass_filenames: false
        always_run: false
        files: ^(exporters/|rules/|build\.py)
        stages: [pre-commit]
