repos:
  - repo: local
    hooks:
      - id: validate-rules
        name: Validate PromQL rules with promtool
        language: system
        entry: python3 validate_rules.py
        pass_filenames: false
        files: ^rules/.*\.yml$
        stages: [pre-commit]

      - id: build-docs
        name: Build docs/data.json
        language: system
        entry: python3 build.py
        pass_filenames: false
        always_run: false
        files: ^(exporters/|rules/|build\.py)
        stages: [pre-commit]
